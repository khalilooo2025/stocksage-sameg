services:
  - type: web
    name: stocksage
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: stocksage-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free

databases:
  - name: stocksage-db
    databaseName: stocksage
    plan: free
