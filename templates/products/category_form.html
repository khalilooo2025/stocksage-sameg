{% extends "layout/base.html" %}
{% block title %}Catégorie{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{% url 'category_list' %}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">Catégorie</h4>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="post" novalidate>{% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>{% endif %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
