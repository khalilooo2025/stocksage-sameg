{% extends "layout/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{% url 'product_list' %}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">{{ title }}</h4>
</div>
<div class="card" style="max-width:700px">
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="row g-3">
        {% for field in form %}
        <div class="{% if field.name == 'description' %}col-12{% else %}col-md-6{% endif %}">
          <label class="form-label fw-semibold">{{ field.label }}{% if field.field.required %} <span class="text-danger">*</span>{% endif %}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>{% endif %}
        </div>
        {% endfor %}
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">{{ action }}</button>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
